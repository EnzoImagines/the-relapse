<script type="module">
import * as THREE from 'three';

// ─── AUDIO ───
let audioCtx, masterGain, humStarted = false;
function initAudio() {
  if (humStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5;
  masterGain.connect(audioCtx.destination);

  // Deep subway rumble
  const sub = audioCtx.createOscillator(); sub.type='sine'; sub.frequency.value=25;
  const subG = audioCtx.createGain(); subG.gain.value=0.025;
  sub.connect(subG); subG.connect(masterGain); sub.start();

  // 60Hz electrical hum
  const h = audioCtx.createOscillator(); h.type='sawtooth'; h.frequency.value=60;
  const hg = audioCtx.createGain(); hg.gain.value=0.012;
  const hf = audioCtx.createBiquadFilter(); hf.type='lowpass'; hf.frequency.value=150;
  h.connect(hf); hf.connect(hg); hg.connect(masterGain); h.start();

  // 120Hz harmonic
  const h2 = audioCtx.createOscillator(); h2.type='sine'; h2.frequency.value=120;
  const h2g = audioCtx.createGain(); h2g.gain.value=0.006;
  h2.connect(h2g); h2g.connect(masterGain); h2.start();

  // Occasional water drip
  setInterval(()=>{
    if(Math.random()>0.4) return;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate);
    const dd=buf.getChannelData(0);
    const freq=800+Math.random()*600;
    for(let i=0;i<dd.length;i++) dd[i]=Math.sin(i/audioCtx.sampleRate*freq*Math.PI*2)*Math.exp(-i/audioCtx.sampleRate*40)*0.08;
    const src=audioCtx.createBufferSource();src.buffer=buf;
    const pan=audioCtx.createStereoPanner();pan.pan.value=Math.random()*2-1;
    const g=audioCtx.createGain();g.gain.value=0.1+Math.random()*0.1;
    src.connect(pan);pan.connect(g);g.connect(masterGain);src.start();
  },3000+Math.random()*5000);

  // Distant metallic creak
  setInterval(()=>{
    if(Math.random()>0.3) return;
    const dur=0.8+Math.random()*0.5;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
    const dd=buf.getChannelData(0);
    const freq=40+Math.random()*30;
    for(let i=0;i<dd.length;i++){
      const env=Math.exp(-i/audioCtx.sampleRate*3);
      dd[i]=(Math.sin(i/audioCtx.sampleRate*freq*Math.PI*2)+Math.random()*0.3)*env*0.05;
    }
    const src=audioCtx.createBufferSource();src.buffer=buf;
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=60+Math.random()*80;f.Q.value=5;
    const g=audioCtx.createGain();g.gain.value=0.15;
    const pan=audioCtx.createStereoPanner();pan.pan.value=Math.random()*2-1;
    src.connect(f);f.connect(pan);pan.connect(g);g.connect(masterGain);src.start();
  },8000+Math.random()*12000);

  // Wind through tunnels (looping)
  const windBuf=audioCtx.createBuffer(1,audioCtx.sampleRate*10,audioCtx.sampleRate);
  const wd=windBuf.getChannelData(0);
  for(let i=0;i<wd.length;i++) wd[i]=(Math.random()*2-1)*0.02*(0.5+0.5*Math.sin(i/audioCtx.sampleRate*0.3));
  const wind=audioCtx.createBufferSource();
  wind.buffer=windBuf;wind.loop=true;
  const wf=audioCtx.createBiquadFilter();wf.type='bandpass';wf.frequency.value=200;wf.Q.value=0.5;
  const wg=audioCtx.createGain();wg.gain.value=0.4;
  wind.connect(wf);wf.connect(wg);wg.connect(masterGain);wind.start();

  // Fluorescent buzz (proximity-based would be ideal, global for now)
  const buzz=audioCtx.createOscillator();buzz.type='square';buzz.frequency.value=120;
  const buzzG=audioCtx.createGain();buzzG.gain.value=0.004;
  const buzzF=audioCtx.createBiquadFilter();buzzF.type='bandpass';buzzF.frequency.value=240;buzzF.Q.value=8;
  buzz.connect(buzzF);buzzF.connect(buzzG);buzzG.connect(masterGain);buzz.start();

  humStarted = true;
}

let isWalking = false, stepPhase = 0;
function playStep() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.1, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/audioCtx.sampleRate*50)*0.25;
  const src = audioCtx.createBufferSource(); src.buffer=buf;
  const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=250+Math.random()*150;
  const g = audioCtx.createGain(); g.gain.value=0.12;
  src.connect(f); f.connect(g); g.connect(masterGain); src.start();
}
function stepLoop() {
  if (!isWalking) return;
  playStep(); stepPhase++;
  setTimeout(stepLoop, 380+Math.random()*60+(stepPhase%2===0?0:40));
}

// Distant train rumble (occasional)
function playDistantTrain() {
  if (!audioCtx) return;
  const dur = 4 + Math.random() * 3;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) {
    const env = Math.sin(Math.PI * i / d.length);
    d[i] = (Math.random()*2-1) * env * 0.15;
  }
  const src = audioCtx.createBufferSource(); src.buffer=buf;
  const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=80;
  const g = audioCtx.createGain(); g.gain.value=0.3;
  src.connect(f); f.connect(g); g.connect(masterGain); src.start();
}

// ─── TEXTURES ───
function makePlatformTile() {
  const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.fillStyle='#3a3a3a'; x.fillRect(0,0,256,256);
  // Concrete texture
  for(let i=0;i<6000;i++){
    const b=45+Math.random()*30;
    x.fillStyle=`rgb(${b},${b},${b})`;
    x.fillRect(Math.random()*256,Math.random()*256,1+Math.random()*2,1+Math.random()*2);
  }
  // Scuff marks
  for(let s=0;s<5;s++){
    x.beginPath(); x.arc(Math.random()*256,Math.random()*256,8+Math.random()*15,0,Math.PI*2);
    x.fillStyle='rgba(30,30,30,0.2)'; x.fill();
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,2);
  return new THREE.MeshStandardMaterial({map:t,roughness:0.92});
}

function makeWallTile() {
  const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.fillStyle='#d4cdb8'; x.fillRect(0,0,256,256);
  // Subway tile pattern
  for(let row=0;row<8;row++) for(let col=0;col<4;col++){
    const ox=(row%2===0)?0:32;
    x.fillStyle='#cfc8b0'; x.fillRect(col*64+ox+1,row*32+1,62,30);
    x.strokeStyle='rgba(80,75,60,0.15)'; x.lineWidth=0.5;
    x.strokeRect(col*64+ox+1,row*32+1,62,30);
  }
  // Grime
  for(let i=0;i<10;i++){
    x.fillStyle=`rgba(60,55,40,${0.03+Math.random()*0.06})`;
    x.fillRect(Math.random()*256,0,1+Math.random()*3,256);
  }
  // Water stains
  for(let s=0;s<2;s++){
    const gx=Math.random()*256, gy=Math.random()*128;
    x.beginPath(); x.arc(gx,gy,10+Math.random()*25,0,Math.PI*2);
    x.fillStyle='rgba(80,75,55,0.12)'; x.fill();
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return new THREE.MeshStandardMaterial({map:t,roughness:0.88});
}

function makeCeilingTile() {
  const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.fillStyle='#2a2a2a'; x.fillRect(0,0,256,256);
  // Grid pattern
  x.strokeStyle='rgba(20,20,20,0.5)'; x.lineWidth=2;
  for(let i=0;i<=4;i++){ x.beginPath(); x.moveTo(i*64,0); x.lineTo(i*64,256); x.stroke(); }
  for(let i=0;i<=4;i++){ x.beginPath(); x.moveTo(0,i*64); x.lineTo(256,i*64); x.stroke(); }
  // Stains
  for(let s=0;s<3;s++){
    x.beginPath(); x.arc(Math.random()*256,Math.random()*256,12+Math.random()*20,0,Math.PI*2);
    x.fillStyle='rgba(15,15,10,0.25)'; x.fill();
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(3,3);
  return new THREE.MeshStandardMaterial({map:t,roughness:0.9});
}

function makeTrackBed() {
  const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.fillStyle='#1a1a1a'; x.fillRect(0,0,256,256);
  for(let i=0;i<10000;i++){
    const b=15+Math.random()*25;
    x.fillStyle=`rgb(${b},${b},${b})`;
    x.fillRect(Math.random()*256,Math.random()*256,1+Math.random()*3,1+Math.random()*3);
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(4,4);
  return new THREE.MeshStandardMaterial({map:t,roughness:0.98});
}

function makeSafetyStripe() {
  const c=document.createElement('canvas'); c.width=256; c.height=64; const x=c.getContext('2d');
  x.fillStyle='#8a7a20'; x.fillRect(0,0,256,64);
  // Faded bumps
  for(let i=0;i<16;i++){
    x.beginPath(); x.arc(i*16+8,32,5,0,Math.PI*2);
    x.fillStyle='rgba(120,110,30,0.4)'; x.fill();
  }
  for(let i=0;i<500;i++){
    x.fillStyle=`rgba(60,55,15,${Math.random()*0.3})`;
    x.fillRect(Math.random()*256,Math.random()*64,1,1);
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(8,1);
  return new THREE.MeshStandardMaterial({map:t,roughness:0.85});
}

// 0=wall, 1=platform, 2=track, 3=tunnel, 4=corridor, 5=stairway, 6=mezzanine

// ─── BUILD ───
function buildLevel() {
  const pm = makePlatformTile(), wm = makeWallTile(), cm = makeCeilingTile();
  const tm = makeTrackBed(), sm = makeSafetyStripe();
  const tunnelMat = new THREE.MeshStandardMaterial({color:0x0a0a0a,roughness:0.95});
  const stairMat = new THREE.MeshStandardMaterial({color:0x333333,roughness:0.9});
  const mezzMat = new THREE.MeshStandardMaterial({color:0x2d2d2d,roughness:0.9});

  for(let y=0;y<MAP.length;y++) for(let x=0;x<MAP[y].length;x++){
    if(MAP[y][x]===0){ walls.add(`${x},${y}`); continue; }
    const wx=x*TILE, wz=y*TILE;
    const cellType = MAP[y][x];

    // Floor
    let floorMat = pm;
    if(cellType===2) floorMat = tm;
    else if(cellType===3) floorMat = tunnelMat;
    else if(cellType===5) floorMat = stairMat;
    else if(cellType===6) floorMat = mezzMat;

    const f=new THREE.Mesh(new THREE.PlaneGeometry(TILE,TILE),floorMat);
    f.rotation.x=-Math.PI/2; f.position.set(wx,cellType===2?-0.4:0,wz);
    f.receiveShadow=true; scene.add(f);

    // Ceiling
    const ch = cellType===6 ? WALL_HEIGHT+1 : WALL_HEIGHT;
    const c=new THREE.Mesh(new THREE.PlaneGeometry(TILE,TILE),cm);
    c.rotation.x=Math.PI/2; c.position.set(wx,ch,wz); scene.add(c);

    // Walls
    for(const d of[
      {dx:0,dy:-1,rx:0,rz:-TILE/2,ry:0},
      {dx:0,dy:1,rx:0,rz:TILE/2,ry:Math.PI},
      {dx:-1,dy:0,rx:-TILE/2,rz:0,ry:Math.PI/2},
      {dx:1,dy:0,rx:TILE/2,rz:0,ry:-Math.PI/2}
    ]){
      const nx=x+d.dx, ny=y+d.dy;
      const nb=(ny>=0&&ny<MAP.length&&nx>=0&&nx<MAP[ny].length)?MAP[ny][nx]:0;
      if(nb===0){
        const w=new THREE.Mesh(new THREE.PlaneGeometry(TILE,ch),wm);
        w.position.set(wx+d.rx,ch/2,wz+d.rz); w.rotation.y=d.ry;
        w.receiveShadow=true; scene.add(w);
      }
    }
  }

  // Safety stripe along platform edges
  // North platform edge (row 5, facing tracks at row 6)
  for(let x=3;x<=16;x++){
    const stripe=new THREE.Mesh(new THREE.PlaneGeometry(TILE,0.4),sm);
    stripe.rotation.x=-Math.PI/2; stripe.position.set(x*TILE,0.01,5*TILE+TILE/2-0.2);
    scene.add(stripe);
  }
  // South platform edge (row 8, facing tracks at row 7)
  for(let x=3;x<=16;x++){
    const stripe=new THREE.Mesh(new THREE.PlaneGeometry(TILE,0.4),sm);
    stripe.rotation.x=-Math.PI/2; stripe.position.set(x*TILE,0.01,8*TILE-TILE/2+0.2);
    scene.add(stripe);
  }

  // Rails
  const railMat = new THREE.MeshStandardMaterial({color:0x555555,metalness:0.6,roughness:0.4});
  for(const rz of [6*TILE-1.2, 6*TILE+1.2, 7*TILE-1.2, 7*TILE+1.2]){
    const rail=new THREE.Mesh(new THREE.BoxGeometry(14*TILE,0.08,0.06),railMat);
    rail.position.set(9.5*TILE,-0.35,rz); scene.add(rail);
  }

  // Railroad ties
  for(let x=3;x<=16;x+=0.5){
    for(const rz of [6*TILE, 7*TILE]){
      const tie=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.06,2.8),
        new THREE.MeshStandardMaterial({color:0x222222,roughness:0.95}));
      tie.position.set(x*TILE,-0.43,rz); scene.add(tie);
    }
  }

  // Pillars on platforms
  const pillarMat = new THREE.MeshStandardMaterial({color:0x444444,roughness:0.7,metalness:0.3});
  for(let x=4;x<=15;x+=3){
    for(const pz of [5*TILE, 8*TILE]){
      const pillar=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,WALL_HEIGHT,8),pillarMat);
      pillar.position.set(x*TILE,WALL_HEIGHT/2,pz); pillar.castShadow=true; scene.add(pillar);
    }
  }

  // Benches (empty)
  const benchMat = new THREE.MeshStandardMaterial({color:0x555555,roughness:0.8,metalness:0.2});
  for(let x=5;x<=14;x+=4){
    for(const pz of [5*TILE+1, 8*TILE-1]){
      const seat=new THREE.Mesh(new THREE.BoxGeometry(2.5,0.08,0.6),benchMat);
      seat.position.set(x*TILE,0.45,pz); seat.castShadow=true; scene.add(seat);
      // Legs
      for(const lx of [-1.1,1.1]) for(const lz of [-0.2,0.2]){
        const leg=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.45,0.06),benchMat);
        leg.position.set(x*TILE+lx,0.225,pz+lz); scene.add(leg);
      }
    }
  }

  // Station signs on walls
  createStationSigns();
}

function createStationSigns() {
  const signBg = new THREE.MeshStandardMaterial({color:0x0a2a4a,roughness:0.6});
  const signBorder = new THREE.MeshStandardMaterial({color:0x1a4a7a,roughness:0.5});

  // Signs on the back wall of platform 1 (north side, z=5*TILE - TILE/2)
  for(let x=5;x<=14;x+=4){
    // Background
    const bg=new THREE.Mesh(new THREE.BoxGeometry(3,0.8,0.05),signBg);
    bg.position.set(x*TILE,2.2,5*TILE-TILE/2+0.03); scene.add(bg);
    // Border
    const border=new THREE.Mesh(new THREE.BoxGeometry(3.1,0.9,0.03),signBorder);
    border.position.set(x*TILE,2.2,5*TILE-TILE/2+0.01); scene.add(border);
    // White text bar
    const textBar=new THREE.Mesh(new THREE.BoxGeometry(2.6,0.2,0.06),
      new THREE.MeshStandardMaterial({color:0xcccccc,roughness:0.5}));
    textBar.position.set(x*TILE,2.2,5*TILE-TILE/2+0.05); scene.add(textBar);
  }

  // Signs on south wall too
  for(let x=5;x<=14;x+=4){
    const bg=new THREE.Mesh(new THREE.BoxGeometry(3,0.8,0.05),signBg);
    bg.position.set(x*TILE,2.2,8*TILE+TILE/2-0.03); bg.rotation.y=Math.PI; scene.add(bg);
    const border=new THREE.Mesh(new THREE.BoxGeometry(3.1,0.9,0.03),signBorder);
    border.position.set(x*TILE,2.2,8*TILE+TILE/2-0.01); border.rotation.y=Math.PI; scene.add(border);
    const textBar=new THREE.Mesh(new THREE.BoxGeometry(2.6,0.2,0.06),
      new THREE.MeshStandardMaterial({color:0xcccccc,roughness:0.5}));
    textBar.position.set(x*TILE,2.2,8*TILE+TILE/2-0.05); textBar.rotation.y=Math.PI; scene.add(textBar);
  }
}

// ─── LIGHTING ───
function addLight(x, z, working=true, flickering=false) {
  // Fixture always visible
  const tube=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.06,0.15),
    new THREE.MeshStandardMaterial({
      color: working ? 0xffffee : 0x222222,
      emissive: working ? 0xffffdd : 0x000000,
      emissiveIntensity: working ? 0.4 : 0
    }));
  tube.position.set(x,WALL_HEIGHT-0.06,z); scene.add(tube);

  if(working){
    const l=new THREE.PointLight(0xffeedd, flickering?0.25:0.12, TILE*2.5);
    l.position.set(x,WALL_HEIGHT-0.15,z); scene.add(l);
    flickers.push({light:l,tube,flickering,phase:Math.random()*Math.PI*2});
  }
}

function setupLighting() {
  // Very dim ambient
  scene.add(new THREE.AmbientLight(0x111111, 0.03));

  // Platform 1 lights
  addLight(4*TILE, 5*TILE, true, false);
  addLight(6*TILE, 5*TILE, false);
  addLight(8*TILE, 5*TILE, true, true);
  addLight(10*TILE, 5*TILE, true, false);
  addLight(12*TILE, 5*TILE, false);
  addLight(14*TILE, 5*TILE, true, true);
  addLight(16*TILE, 5*TILE, false);

  // Platform 2 lights
  addLight(4*TILE, 8*TILE, true, true);
  addLight(6*TILE, 8*TILE, true, false);
  addLight(8*TILE, 8*TILE, false);
  addLight(10*TILE, 8*TILE, true, true);
  addLight(12*TILE, 8*TILE, true, false);
  addLight(14*TILE, 8*TILE, false);
  addLight(16*TILE, 8*TILE, true, false);

  // Corridor lights
  addLight(6*TILE, 4*TILE, true, true);
  addLight(6*TILE, 3*TILE, false);
  addLight(10*TILE, 9*TILE, true, false);
  addLight(10*TILE, 10*TILE, false);

  // Mezzanine
  addLight(5*TILE, 1*TILE, true, false);
  addLight(7*TILE, 1*TILE, true, true);
  addLight(6*TILE, 2*TILE, false);
  addLight(8*TILE, 2*TILE, true, false);

  // Waiting area
  addLight(10*TILE, 11*TILE, true, true);
  addLight(10*TILE, 12*TILE, false);

  // Tunnel red emergency lights
  const redLeft = new THREE.PointLight(0xff2200, 0.06, TILE*3);
  redLeft.position.set(1.5*TILE, WALL_HEIGHT-0.3, 6.5*TILE); scene.add(redLeft);
  const redRight = new THREE.PointLight(0xff2200, 0.06, TILE*3);
  redRight.position.set(17.5*TILE, WALL_HEIGHT-0.3, 6.5*TILE); scene.add(redRight);
}

// ─── COLLISION ───
function canMove(x,z){
  const m=0.3;
  for(const[ox,oz]of[[-m,-m],[m,-m],[-m,m],[m,m]]){
    if(walls.has(`${Math.floor((x+ox+TILE/2)/TILE)},${Math.floor((z+oz+TILE/2)/TILE)}`)) return false;
  }
  return true;
}

// ─── ANNOUNCEMENTS ───
const announcements = [
  `The next train to ${STATIONS[0]} has been delayed.`,
  `Mind the gap between the train and the platform edge.`,
  `The 11:47 to ${STATIONS[3]} is arriving at platform 2.`,
  `This station is: ${STATIONS[currentStationIdx]}.`,
  `Please stand behind the yellow line.`,
  `The last train departed some time ago.`,
  `Service to ${STATIONS[7]} has been suspended until further notice.`,
  `The train now approaching is not in service.`,
  `Please keep your belongings with you at all times.`,
  `The next station is ${STATIONS[Math.floor(Math.random()*STATIONS.length)]}. Or was it?`,
];
let lastAnnounce = 0;

function maybeAnnounce(t) {
  if(t - lastAnnounce < 25 + Math.random()*40) return;
  lastAnnounce = t;
  const el = document.getElementById('announcement');
  el.textContent = announcements[Math.floor(Math.random()*announcements.length)];
  el.classList.add('visible');
  setTimeout(()=> el.classList.remove('visible'), 6000);
}

// ─── CONTROLS ───
const keys = {};
addEventListener('keydown', e => keys[e.key.toLowerCase()]=true);
addEventListener('keyup', e => keys[e.key.toLowerCase()]=false);

// ─── INIT ───
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.fog = new THREE.FogExp2(0x000000, 0.055);
  clock = new THREE.Clock();

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.7;
  document.body.appendChild(renderer.domElement);

  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(9*TILE, 1.6, 5*TILE);

  // Flashlight
  flashlight = new THREE.SpotLight(0xffeedd, 3.5, 25, Math.PI/6, 0.4, 1.2);
  flashlight.castShadow = true;
  flashlight.shadow.mapSize.set(512,512);
  scene.add(flashlight);
  flashlightTarget = new THREE.Object3D();
  scene.add(flashlightTarget);
  flashlight.target = flashlightTarget;

  buildLevel();
  setupLighting();

  // Events
  document.addEventListener('click', () => {
    document.body.requestPointerLock();
    initAudio();
    document.getElementById('prompt').classList.add('hidden');
  });
  document.addEventListener('mousemove', e => {
    if(document.pointerLockElement){
      yaw -= e.movementX * 0.002;
      pitch -= e.movementY * 0.002;
      pitch = Math.max(-1.2, Math.min(1.2, pitch));
    }
  });
  addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  animate();
}

// ─── LOOP ───
let lastRoom = '', trainTimer = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1), t = clock.getElapsedTime();

  // Movement
  const speed = 2.5, dir = new THREE.Vector3();
  if(keys['w']) dir.z -= 1;
  if(keys['s']) dir.z += 1;
  if(keys['a']) dir.x -= 1;
  if(keys['d']) dir.x += 1;
  const moving = dir.length() > 0.01;
  dir.normalize().multiplyScalar(speed*dt);
  dir.applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const nx = camera.position.x+dir.x, nz = camera.position.z+dir.z;
  if(canMove(nx, camera.position.z)) camera.position.x = nx;
  if(canMove(camera.position.x, nz)) camera.position.z = nz;

  // Head bob
  camera.position.y = 1.6 + (moving ? Math.sin(t*8)*0.03 : 0);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Footsteps
  if(moving && !isWalking){ isWalking=true; stepLoop(); }
  else if(!moving) isWalking = false;

  // Flashlight follow
  flashlight.position.copy(camera.position);
  flashlight.position.y -= 0.3;
  const fd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  flashlightTarget.position.copy(camera.position).add(fd.multiplyScalar(10));
  flashlightTarget.position.y += Math.sin(t*1.1)*0.04;

  // Flicker lights
  for(const f of flickers){
    if(f.flickering){
      const fl = Math.sin(t*15+f.phase)*Math.sin(t*23+f.phase*2);
      const on = fl > -0.3;
      f.light.intensity = on ? 0.12+Math.random()*0.13 : 0;
      f.tube.material.emissiveIntensity = on ? 0.4 : 0;
      f.tube.material.color.set(on ? 0xffffee : 0x222222);
    }
  }

  // Room label
  const r = LABELS[`${Math.round(camera.position.x/TILE)},${Math.round(camera.position.z/TILE)}`]||'';
  if(r && r!==lastRoom){ lastRoom=r; document.getElementById('hud-room').textContent=r; }

  // Announcements
  maybeAnnounce(t);

  // Distant train sounds
  trainTimer += dt;
  if(trainTimer > 30 + Math.random()*60){ trainTimer=0; playDistantTrain(); }

  renderer.render(scene, camera);
}

init();
</script>
