<script>
// Global UI functions (need to be non-module for onclick)
let foundLogs = new Set();
let logData = [];
let overlayOpen = false;

function openLogOverlay() {
  document.exitPointerLock();
  const el = document.getElementById('log-overlay');
  el.classList.add('open');
  overlayOpen = true;
  renderLogList();
}
function closeLogOverlay() {
  document.getElementById('log-overlay').classList.remove('open');
  overlayOpen = false;
}
function openLogDetail(id) {
  const log = logData.find(l => l.id === id);
  if (!log || !foundLogs.has(id)) return;
  document.getElementById('log-detail-title').textContent = log.title;
  document.getElementById('log-detail-text').textContent = log.text;
  document.getElementById('log-detail').classList.add('open');
}
function closeLogDetail() {
  document.getElementById('log-detail').classList.remove('open');
}
function renderLogList() {
  const el = document.getElementById('log-list');
  el.innerHTML = '';
  for (const log of logData) {
    const div = document.createElement('div');
    div.className = 'log-item' + (foundLogs.has(log.id) ? '' : ' locked');
    div.textContent = foundLogs.has(log.id) ? log.title : `Log #${log.id} — ???`;
    if (foundLogs.has(log.id)) div.onclick = () => openLogDetail(log.id);
    el.appendChild(div);
  }
}
function updateCounter() {
  document.getElementById('log-counter').textContent = `📋 Logs: ${foundLogs.size} / 50`;
}
let paperOpen = false;
function showPaper(log) {
  document.exitPointerLock();
  document.getElementById('paper-title').textContent = log.title;
  document.getElementById('paper-text').textContent = log.text;
  document.getElementById('paper-dialog').classList.add('open');
  paperOpen = true;
}
function closePaper() {
  document.getElementById('paper-dialog').classList.remove('open');
  paperOpen = false;
  document.body.requestPointerLock();
}
</script>

<script type="module">
import * as THREE from 'three';
import { LOGS } from './logs.js';

// Expose log data to global
window.logData = LOGS;

let scene, camera, renderer, clock;
let yaw = 0, pitch = 0;
const T = 3.0, H = 2.8; // Narrower tiles, lower ceiling

const VIEW_DIST = 5;
const chunkVersions = new Map();
const builtChunks = new Map();

// Log objects in the world
const worldLogs = new Map(); // "cx,cz" -> { mesh, id }
let nearLog = null; // log currently in range

// ─── TEXTURES ───
let carpetMat, wallMat, ceilingMat, paperMat;

function makeCarpet(){
  const c=document.createElement('canvas');c.width=c.height=256;const x=c.getContext('2d');
  x.fillStyle='#8a7a55';x.fillRect(0,0,256,256);
  for(let i=0;i<8000;i++){const b=100+Math.random()*40;x.fillStyle=`rgb(${b},${b*0.88|0},${b*0.6|0})`;x.fillRect(Math.random()*256,Math.random()*256,1+Math.random()*2,1+Math.random()*2);}
  for(let s=0;s<4;s++){x.beginPath();x.arc(Math.random()*256,Math.random()*256,10+Math.random()*20,0,Math.PI*2);x.fillStyle='rgba(70,60,40,0.25)';x.fill();}
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return new THREE.MeshStandardMaterial({map:t,roughness:0.95});
}
function makeWall(){
  const c=document.createElement('canvas');c.width=c.height=256;const x=c.getContext('2d');
  x.fillStyle='#c5b890';x.fillRect(0,0,256,256);
  for(let i=0;i<20;i++){x.fillStyle=`rgba(100,90,70,${0.03+Math.random()*0.08})`;x.fillRect(Math.random()*256,0,1+Math.random()*3,256);}
  for(let s=0;s<2;s++){x.beginPath();x.arc(Math.random()*256,Math.random()*60,10+Math.random()*20,0,Math.PI*2);x.fillStyle='rgba(80,75,50,0.1)';x.fill();}
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return new THREE.MeshStandardMaterial({map:t,roughness:0.9,side:THREE.DoubleSide});
}
function makeCeiling(){
  const c=document.createElement('canvas');c.width=c.height=256;const x=c.getContext('2d');
  x.fillStyle='#b8ad95';x.fillRect(0,0,256,256);
  x.strokeStyle='rgba(80,70,55,0.3)';x.lineWidth=1;
  x.strokeRect(2,2,252,252);x.strokeRect(128,2,126,252);x.strokeRect(2,128,252,126);
  for(let s=0;s<2;s++){x.beginPath();x.arc(Math.random()*256,Math.random()*256,15+Math.random()*25,0,Math.PI*2);x.fillStyle='rgba(70,60,45,0.15)';x.fill();}
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return new THREE.MeshStandardMaterial({map:t,roughness:0.85});
}

// ─── EDGE-BASED WALLS ───
function getVersion(cx,cz){ const k=`${cx},${cz}`; if(!chunkVersions.has(k))chunkVersions.set(k,0); return chunkVersions.get(k); }
function bumpVersion(cx,cz){ const k=`${cx},${cz}`; const v=(chunkVersions.get(k)||0)+1; chunkVersions.set(k,v); return v; }

function edgeHasWall(x1,z1,x2,z2){
  // Guarantee spawn area open
  const d1=Math.abs(x1)+Math.abs(z1), d2=Math.abs(x2)+Math.abs(z2);
  const v1=getVersion(x1,z1),v2=getVersion(x2,z2);
  if(d1<=3 && d2<=3 && v1===0 && v2===0) return false;

  // ─── CORRIDOR REGION SYSTEM ───
  // Divide world into regions of ~7 cells. Each region has a corridor direction.
  // Walls ALONG the corridor are rare (keep it open for walking).
  // Walls ACROSS the corridor are common (create corridor walls).
  // At region boundaries, walls are reduced so corridors connect.
  const regionSize = 7;
  const off = 50000; // offset to handle negatives
  const rx1=Math.floor((x1+off)/regionSize), rz1=Math.floor((z1+off)/regionSize);
  const rx2=Math.floor((x2+off)/regionSize), rz2=Math.floor((z2+off)/regionSize);

  // Region corridor direction — seeded by region coords + versions of both cells
  let rh=(rx1*48271+rz1*16807+v1*31+v2*37)|0;
  rh=(rh^(rh>>>13))*1274126177; rh=rh^(rh>>>16);
  const corridorNS = ((rh>>>0)%2===0); // true = N-S corridor, false = E-W

  // What does this edge block?
  const blocksNS = (z1!==z2); // cells stacked N-S → wall blocks N-S travel
  const blocksEW = (x1!==x2); // cells side-by-side → wall blocks E-W travel

  let wallChance;
  if(corridorNS){
    wallChance = blocksNS ? 0.06 : 0.82; // Keep N-S open, wall off sides
  } else {
    wallChance = blocksEW ? 0.06 : 0.82; // Keep E-W open, wall off sides
  }

  // Region boundary — create openings between different corridor sections
  if(rx1!==rx2 || rz1!==rz2){
    wallChance = 0.25; // boundary = more open, creates turns/junctions
  }

  // Rare open room: ~3% of cells have reduced walls everywhere
  let oh=(x1*999961+z1*999979+x2*999983+z2*999931+v1*7+v2*11)|0;
  oh=(oh^(oh>>>15))*2654435761; oh=oh^(oh>>>13);
  if(((oh>>>0)%100)<3) wallChance=0.1;

  // Final deterministic hash for this specific edge
  let h=(x1*374761393+z1*668265263+x2*982451653+z2*271828183+v1*314159+v2*161803)|0;
  h=(h^(h>>>13))*1274126177; h=(h^(h>>>16));
  const r=((h>>>0)%1000)/1000;
  return r < wallChance;
}

function cellWalls(cx,cz){
  return {
    n:edgeHasWall(cx,cz,cx,cz-1),
    s:edgeHasWall(cx,cz,cx,cz+1),
    w:edgeHasWall(cx,cz,cx-1,cz),
    e:edgeHasWall(cx,cz,cx+1,cz),
  };
}

// ─── LOG PLACEMENT ───
// Deterministic per-cell: ~8% of cells get a log
function cellLogId(cx,cz,ver){
  let h=(cx*123456789+cz*987654321+ver*555555)|0;
  h=(h^(h>>>13))*1274126177;h=(h^(h>>>16));
  const r=((h>>>0)%1000)/1000;
  if(r>0.08) return -1; // no log
  return (((h>>>0)%50))+1; // log id 1-50
}

function spawnLog(cx,cz,logId){
  const key=`${cx},${cz}`;
  if(worldLogs.has(key)) return;

  const wx=cx*T, wz=cz*T;

  // Paper on floor or floating slightly (on a "table")
  const onTable = Math.random() > 0.6;
  const group = new THREE.Group();

  if(onTable){
    // Small table
    const tableMat = new THREE.MeshStandardMaterial({color:0x665544,roughness:0.8});
    const top = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.04,0.5),tableMat);
    top.position.y=0.55; group.add(top);
    for(const lx of[-0.28,0.28]) for(const lz of[-0.18,0.18]){
      const leg=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.55,0.04),tableMat);
      leg.position.set(lx,0.275,lz); group.add(leg);
    }
  }

  // Paper
  const paper = new THREE.Mesh(
    new THREE.PlaneGeometry(0.3,0.4),
    new THREE.MeshStandardMaterial({color:0xeee8d5,roughness:0.7,side:THREE.DoubleSide})
  );
  paper.rotation.x = onTable ? -Math.PI/2 : -Math.PI/2;
  paper.position.y = onTable ? 0.58 : 0.01;
  // Slight random rotation
  paper.rotation.z = (Math.random()-0.5)*0.3;
  group.add(paper);

  // Slight offset within cell
  const ox=(Math.random()-0.5)*0.5, oz=(Math.random()-0.5)*0.5;
  group.position.set(wx+ox,0,wz+oz);
  scene.add(group);

  worldLogs.set(key,{group,logId,cx,cz});
}

function removeWorldLog(key){
  const wl=worldLogs.get(key);
  if(!wl)return;
  scene.remove(wl.group);
  worldLogs.delete(key);
}

// ─── BUILD CHUNK ───
function buildChunk(cx,cz){
  const key=`${cx},${cz}`;
  const ver=getVersion(cx,cz);
  const existing=builtChunks.get(key);
  if(existing&&existing.version===ver) return;
  if(existing) destroyChunk(key);

  const walls=cellWalls(cx,cz);
  const meshes=[],lights=[];
  const wx=cx*T, wz=cz*T;

  // Floor
  const f=new THREE.Mesh(new THREE.PlaneGeometry(T,T),carpetMat);
  f.rotation.x=-Math.PI/2;f.position.set(wx,0,wz);scene.add(f);meshes.push(f);

  // Ceiling
  const c=new THREE.Mesh(new THREE.PlaneGeometry(T,T),ceilingMat);
  c.rotation.x=Math.PI/2;c.position.set(wx,H,wz);scene.add(c);meshes.push(c);

  // Walls
  if(walls.n){const w=new THREE.Mesh(new THREE.PlaneGeometry(T,H),wallMat);w.position.set(wx,H/2,wz-T/2);scene.add(w);meshes.push(w);}
  if(walls.s){const w=new THREE.Mesh(new THREE.PlaneGeometry(T,H),wallMat);w.position.set(wx,H/2,wz+T/2);w.rotation.y=Math.PI;scene.add(w);meshes.push(w);}
  if(walls.w){const w=new THREE.Mesh(new THREE.PlaneGeometry(T,H),wallMat);w.position.set(wx-T/2,H/2,wz);w.rotation.y=Math.PI/2;scene.add(w);meshes.push(w);}
  if(walls.e){const w=new THREE.Mesh(new THREE.PlaneGeometry(T,H),wallMat);w.position.set(wx+T/2,H/2,wz);w.rotation.y=-Math.PI/2;scene.add(w);meshes.push(w);}

  // Light fixture
  let h2=(cx*31337+cz*73+ver*99)|0;h2=(h2^(h2>>>13))*1274126177;h2=h2^(h2>>>16);
  const lr=((h2>>>0)%1000)/1000;
  const working=lr>0.12;
  const hasReal=working&&(Math.abs(cx)+Math.abs(cz))%2===0;
  const flickering=hasReal&&lr>0.94;

  const tube=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.04,0.1),
    new THREE.MeshStandardMaterial({
      color:working?0xffffee:0x333333,
      emissive:working?0xffffdd:0x000000,
      emissiveIntensity:working?0.8:0
    }));
  tube.position.set(wx,H-0.04,wz);scene.add(tube);meshes.push(tube);

  if(hasReal){
    const l=new THREE.PointLight(0xffeedd,0.9,T*2.5);
    l.position.set(wx,H-0.1,wz);scene.add(l);lights.push(l);
    if(flickering){l.userData.flickering=true;l.userData.phase=lr*20;l.userData.tube=tube;}
  }

  builtChunks.set(key,{meshes,lights,version:ver,walls,cx,cz});

  // Maybe spawn a log
  const logId=cellLogId(cx,cz,ver);
  if(logId>0 && !foundLogs.has(logId)){
    spawnLog(cx,cz,logId);
  }
}

function destroyChunk(key){
  const chunk=builtChunks.get(key);
  if(!chunk)return;
  for(const m of chunk.meshes){scene.remove(m);if(m.geometry)m.geometry.dispose();}
  for(const l of chunk.lights)scene.remove(l);
  builtChunks.delete(key);
  // Also remove any log in this cell
  removeWorldLog(key);
}

// ─── VIEW MANAGEMENT ───
function isInView(cx,cz,px,pz,fx,fz){
  const dx=cx-px,dz=cz-pz;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<1.5)return true;
  if(dist>VIEW_DIST)return false;
  return(dx*fx+dz*fz)/Math.max(dist,0.01)>-0.25;
}

function updateWorld(){
  const px=Math.round(camera.position.x/T),pz=Math.round(camera.position.z/T);
  const fwd=new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0),yaw);

  for(const[key,chunk]of builtChunks){
    if(!isInView(chunk.cx,chunk.cz,px,pz,fwd.x,fwd.z)){
      bumpVersion(chunk.cx,chunk.cz);
      destroyChunk(key);
    }
  }

  for(let dx=-VIEW_DIST;dx<=VIEW_DIST;dx++)
    for(let dz=-VIEW_DIST;dz<=VIEW_DIST;dz++){
      if(dx*dx+dz*dz>VIEW_DIST*VIEW_DIST)continue;
      const cx=px+dx,cz=pz+dz;
      if(isInView(cx,cz,px,pz,fwd.x,fwd.z)) buildChunk(cx,cz);
    }
}

// ─── COLLISION ───
function getWalls(cx,cz){
  const key=`${cx},${cz}`;
  const chunk=builtChunks.get(key);
  if(chunk)return chunk.walls;
  return cellWalls(cx,cz);
}

function canMove(x,z){
  const cx=Math.round(x/T),cz=Math.round(z/T);
  const lx=x-cx*T,lz=z-cz*T;
  const m=0.3;
  const w=getWalls(cx,cz);
  if(lz<-T/2+m&&w.n)return false;
  if(lz>T/2-m&&w.s)return false;
  if(lx<-T/2+m&&w.w)return false;
  if(lx>T/2-m&&w.e)return false;
  return true;
}

// ─── LOG INTERACTION ───
function checkNearLog(){
  nearLog=null;
  const px=camera.position.x,pz=camera.position.z;
  for(const[key,wl]of worldLogs){
    const dx=wl.group.position.x-px,dz=wl.group.position.z-pz;
    if(dx*dx+dz*dz<2.5){ // within ~1.6 units
      nearLog=wl;
      break;
    }
  }
  const el=document.getElementById('interact');
  if(nearLog) el.classList.add('visible');
  else el.classList.remove('visible');
}

function pickupLog(){
  if(!nearLog)return;
  const id=nearLog.logId;
  foundLogs.add(id);
  const key=`${nearLog.cx},${nearLog.cz}`;
  removeWorldLog(key);
  nearLog=null;
  document.getElementById('interact').classList.remove('visible');
  updateCounter();

  const log=LOGS.find(l=>l.id===id);
  if(log) showPaper(log);

  // Save to localStorage
  localStorage.setItem('dreamSubwayLogs',JSON.stringify([...foundLogs]));
}

// Load saved logs
function loadSavedLogs(){
  try{
    const saved=JSON.parse(localStorage.getItem('dreamSubwayLogs')||'[]');
    for(const id of saved) foundLogs.add(id);
    updateCounter();
  }catch(e){}
}

// ─── AUDIO ───
let audioCtx,masterGain,humStarted=false;
function initAudio(){
  if(humStarted)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=0.5;
  masterGain.connect(audioCtx.destination);

  const h=audioCtx.createOscillator();h.type='sawtooth';h.frequency.value=60;
  const hg=audioCtx.createGain();hg.gain.value=0.01;
  const hf=audioCtx.createBiquadFilter();hf.type='lowpass';hf.frequency.value=150;
  h.connect(hf);hf.connect(hg);hg.connect(masterGain);h.start();

  const buzz=audioCtx.createOscillator();buzz.type='square';buzz.frequency.value=120;
  const buzzG=audioCtx.createGain();buzzG.gain.value=0.005;
  const buzzF=audioCtx.createBiquadFilter();buzzF.type='bandpass';buzzF.frequency.value=240;buzzF.Q.value=8;
  buzz.connect(buzzF);buzzF.connect(buzzG);buzzG.connect(masterGain);buzz.start();

  setInterval(()=>{
    if(Math.random()>0.4)return;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.12,audioCtx.sampleRate);
    const dd=buf.getChannelData(0);const freq=800+Math.random()*500;
    for(let i=0;i<dd.length;i++)dd[i]=Math.sin(i/audioCtx.sampleRate*freq*Math.PI*2)*Math.exp(-i/audioCtx.sampleRate*45)*0.06;
    const src=audioCtx.createBufferSource();src.buffer=buf;
    const pan=audioCtx.createStereoPanner();pan.pan.value=Math.random()*2-1;
    const g=audioCtx.createGain();g.gain.value=0.08+Math.random()*0.08;
    src.connect(pan);pan.connect(g);g.connect(masterGain);src.start();
  },4000);

  setInterval(()=>{
    if(Math.random()>0.3)return;
    const dur=0.6+Math.random()*0.4;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
    const dd=buf.getChannelData(0);const freq=35+Math.random()*25;
    for(let i=0;i<dd.length;i++){const env=Math.exp(-i/audioCtx.sampleRate*3);dd[i]=(Math.sin(i/audioCtx.sampleRate*freq*Math.PI*2)+Math.random()*0.3)*env*0.04;}
    const src=audioCtx.createBufferSource();src.buffer=buf;
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=50+Math.random()*60;f.Q.value=5;
    const g=audioCtx.createGain();g.gain.value=0.12;
    const pan=audioCtx.createStereoPanner();pan.pan.value=Math.random()*2-1;
    src.connect(f);f.connect(pan);pan.connect(g);g.connect(masterGain);src.start();
  },10000);

  humStarted=true;
}

let isWalking=false,stepPhase=0;
function playStep(){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.1,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/audioCtx.sampleRate*50)*0.2;
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=200+Math.random()*100;
  const g=audioCtx.createGain();g.gain.value=0.1;
  src.connect(f);f.connect(g);g.connect(masterGain);src.start();
}
function stepLoop(){if(!isWalking)return;playStep();stepPhase++;setTimeout(stepLoop,380+Math.random()*60+(stepPhase%2===0?0:40));}

// ─── CONTROLS ───
const keys={};
addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='e') pickupLog();
  if(e.key==='Escape'){
    if(paperOpen) closePaper();
    else if(document.getElementById('log-detail').classList.contains('open')) closeLogDetail();
    else if(document.getElementById('log-overlay').classList.contains('open')) closeLogOverlay();
  }
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// ─── INIT ───
function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a1708);
  scene.fog=new THREE.Fog(0x1a1708, 1, 18); // Linear fog: starts close, full at 18 units
  clock=new THREE.Clock();

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=false;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;
  document.body.appendChild(renderer.domElement);

  camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,100);
  camera.position.set(0,1.5,0);

  scene.add(new THREE.AmbientLight(0xffe8c0,0.45));

  carpetMat=makeCarpet();wallMat=makeWall();ceilingMat=makeCeiling();

  // Initial build
  for(let dx=-VIEW_DIST;dx<=VIEW_DIST;dx++)
    for(let dz=-VIEW_DIST;dz<=VIEW_DIST;dz++)
      if(dx*dx+dz*dz<=VIEW_DIST*VIEW_DIST) buildChunk(dx,dz);

  loadSavedLogs();

  document.addEventListener('click',()=>{
    if(!overlayOpen&&!paperOpen){
      document.body.requestPointerLock();initAudio();
      document.getElementById('prompt').classList.add('hidden');
    }
  });
  document.addEventListener('mousemove',e=>{
    if(document.pointerLockElement){
      yaw-=e.movementX*0.002;
      pitch-=e.movementY*0.002;
      pitch=Math.max(-1.2,Math.min(1.2,pitch));
    }
  });
  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });

  animate();
}

// ─── LOOP ───
let updateTimer=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.1),t=clock.getElapsedTime();

  if(!overlayOpen&&!paperOpen){
    const speed=2.5,dir=new THREE.Vector3();
    if(keys['w'])dir.z-=1;if(keys['s'])dir.z+=1;
    if(keys['a'])dir.x-=1;if(keys['d'])dir.x+=1;
    const moving=dir.length()>0.01;
    dir.normalize().multiplyScalar(speed*dt);
    dir.applyAxisAngle(new THREE.Vector3(0,1,0),yaw);
    const nx=camera.position.x+dir.x,nz=camera.position.z+dir.z;
    if(canMove(nx,camera.position.z))camera.position.x=nx;
    if(canMove(camera.position.x,nz))camera.position.z=nz;
    camera.position.y=1.5+(moving?Math.sin(t*8)*0.015:0);
    camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;
    if(moving&&!isWalking){isWalking=true;stepLoop();}
    else if(!moving)isWalking=false;
  }

  updateTimer+=dt;
  if(updateTimer>0.15){
    updateTimer=0;
    updateWorld();
    checkNearLog();
    const px=Math.round(camera.position.x/T),pz=Math.round(camera.position.z/T);
    document.getElementById('hud').textContent=`level ${Math.abs(px+pz*7)%100}`;
  }

  // Flicker
  for(const[,chunk]of builtChunks)
    for(const l of chunk.lights)
      if(l.userData.flickering){
        const fl=Math.sin(t*12+l.userData.phase)*Math.sin(t*19+l.userData.phase*2);
        const on=fl>-0.2;
        l.intensity=on?0.7+Math.random()*0.2:0;
        if(l.userData.tube){l.userData.tube.material.emissiveIntensity=on?0.8:0;l.userData.tube.material.color.set(on?0xffffee:0x333333);}
      }

  renderer.render(scene,camera);
}

init();
</script>
